# Purpose: Loads base settings and any site (virtual host) configs from /etc/nginx/conf.d/.
# Global NGINX config
user  www-data;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Logging (optional, Docker best practice: forward to stdout/stderr)
    access_log  /dev/stdout;
    error_log   /dev/stderr;

    # Include all site configs
    include /etc/nginx/conf.d/*.conf;
}
