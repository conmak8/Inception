# 🐳 Inception Project - Docker Compose Configuration
# Note: Remove version line - it's deprecated in newer Docker Compose

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped

    environment:
      WP_DB_NAME: ${WP_DB_NAME}
      WP_DB_USER: ${WP_DB_USER}

    secrets:
      - db_password
      - db_root_password

    volumes:
      # 📂 Persist database data
      - /home/mak/data/mariadb:/var/lib/mysql

    networks:
      - inception_net

    # 🔍 Add healthcheck to verify MariaDB is ready
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

secrets:
  db_password:
    file: ../secrets/db_password.txt  # Correct path - secrets is sibling to srcs
  db_root_password:
    file: ../secrets/db_root_password.txt  # Correct path - secrets is sibling to srcs

networks:
  inception_net:
    driver: bridge